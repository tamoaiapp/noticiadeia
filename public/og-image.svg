<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Gradiente decorativo -->
  <ellipse cx="200" cy="315" rx="400" ry="400" fill="#1d4ed8" opacity="0.15"/>
  <ellipse cx="1100" cy="100" rx="300" ry="300" fill="#3b82f6" opacity="0.1"/>

  <!-- Ícone grande -->
  <g transform="translate(100, 215)">
    <rect width="100" height="100" rx="22" fill="#1d4ed8"/>
    <circle cx="50" cy="50" r="10" fill="white"/>
    <line x1="50" y1="40" x2="50" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="60" x2="50" y2="80" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="20" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="50" x2="80" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="43" y1="43" x2="27" y2="27" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="57" y1="57" x2="73" y2="73" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="50" cy="18" r="5" fill="white" opacity="0.9"/>
    <circle cx="50" cy="82" r="5" fill="white" opacity="0.9"/>
    <circle cx="18" cy="50" r="5" fill="white" opacity="0.9"/>
    <circle cx="82" cy="50" r="5" fill="white" opacity="0.9"/>
    <circle cx="25" cy="25" r="4" fill="white" opacity="0.7"/>
    <circle cx="75" cy="75" r="4" fill="white" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="230" y="300" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="80" letter-spacing="-3" fill="white">notícia</text>
  <text x="696" y="300" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="80" letter-spacing="-3" fill="#3b82f6">de</text>
  <!-- badge "ia" -->
  <rect x="792" y="228" width="110" height="72" rx="12" fill="#1d4ed8"/>
  <text x="847" y="281" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" letter-spacing="-2" fill="white" text-anchor="middle">ia</text>

  <!-- Tagline -->
  <text x="230" y="360" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="28" fill="#64748b" letter-spacing="2">INTELIGÊNCIA ARTIFICIAL PARA O BRASIL</text>

  <!-- Divisor -->
  <line x1="100" y1="410" x2="1100" y2="410" stroke="#1e293b" stroke-width="1"/>

  <!-- Badges de categoria -->
  <rect x="100" y="440" width="160" height="44" rx="22" fill="#1d4ed8" opacity="0.2"/>
  <text x="180" y="467" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#3b82f6" text-anchor="middle">Lançamentos</text>

  <rect x="280" y="440" width="140" height="44" rx="22" fill="#1d4ed8" opacity="0.2"/>
  <text x="350" y="467" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#3b82f6" text-anchor="middle">Ferramentas</text>

  <rect x="440" y="440" width="160" height="44" rx="22" fill="#1d4ed8" opacity="0.2"/>
  <text x="520" y="467" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#3b82f6" text-anchor="middle">IA no Brasil</text>

  <rect x="620" y="440" width="140" height="44" rx="22" fill="#1d4ed8" opacity="0.2"/>
  <text x="690" y="467" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#3b82f6" text-anchor="middle">Negócios</text>

  <!-- URL -->
  <text x="1100" y="580" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="24" fill="#334155" text-anchor="end">noticiadeia.com</text>
</svg>
